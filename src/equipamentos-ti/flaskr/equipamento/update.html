{% extends "base.html" %}

{% block header %}

<h1>

{% block title %}

Editar Equipamento

{% endblock %}

</h1>

{% endblock %}

{% block content %}

<form method="post">

<label>Nome</label>

<input
name="nome"
value="{{ equipamento['nome'] }}"
required>

<label>Categoria</label>

<input
name="categoria"
value="{{ equipamento['categoria'] }}"
required>

<label>Fabricante</label>

<input
name="fabricante"
value="{{ equipamento['fabricante'] }}"
required>

<label>Patrimônio</label>

<input
name="patrimonio"
value="{{ equipamento['patrimonio'] }}"
required>

<label>Localização</label>

<input
name="localizacao"
value="{{ equipamento['localizacao'] }}"
required>

<label>Status</label>

<input
name="status"
value="{{ equipamento['status'] }}"
required>

<input
type="submit"
value="Salvar Alterações">

</form>

<hr>

<form
action="{{ url_for('equipamento.delete', id=equipamento['id']) }}"
method="post">

<input
class="danger"
type="submit"
value="Excluir Equipamento"
onclick="return confirm('Deseja realmente excluir este equipamento?');">

</form>

{% endblock %}
